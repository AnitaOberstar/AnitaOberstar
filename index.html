<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IP Lookup Dashboard</title>
<!-- Axios CDN -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<!-- External CSS -->
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>IP Address Lookup</h1>
    </header>
<main class="container">
    <!-- Auto-detected message -->
    <section id="autoMessage" class="auto-box"></section>
    <p>Enter an IP address to fetch geolocation data using <strong>ipapi.co</strong>.</p>
    <form id="lookupForm">
        <div class="form-row">
            <label for="ipInput">IP Address:</label>
            <input type="text" id="ipInput" placeholder="Enter IP address (e.g., 8.8.8.8)">
        </div>
        <button type="submit">Lookup</button>
    </form>
    <section id="result"></section>
    <section id="notInUK" class="warning-box"></section>
</main>
<!-- External JS -->
<script src="main.js"></script>

</body>
</html>
